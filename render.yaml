services:
  # 기존 무료 Web Service: 예약 사이트에 접속해 실시간 잔여석을 조회하는 API 서버
  - type: web
    name: divespot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PARADIVE_COOKIE
        sync: false
      - key: DEEPSTATION_ID
        sync: false
      - key: DEEPSTATION_PASSWORD
        sync: false
      - key: DEEPSTATION_CACHE_SECONDS
        value: 300
      - key: AVAILABILITY_CACHE_SECONDS
        value: 300
      - key: DEEPSTATION_SESSION_SECONDS
        value: 21600
      - key: DEEPSTATION_ENTRY_TIMEOUT_SECONDS
        value: 8
      - key: DEEPSTATION_USER_CHECK_TIMEOUT_SECONDS
        value: 25
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright
      # 공개 조회 전용 GET API이므로 정적 프런트엔드의 교차 출처 요청을 허용합니다.
      - key: CORS_ALLOW_ORIGIN
        value: https://divespot-site.onrender.com

  # 새 접속 주소: 서버가 잠들어 있어도 즉시 표시되는 정적 화면
  - type: web
    name: divespot-site
    runtime: static
    buildCommand: echo "DiveSpot static frontend ready"
    staticPublishPath: ./public
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    headers:
      - path: /config.js
        name: Cache-Control
        value: no-store
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

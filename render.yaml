services:
  - type: web
    name: divespot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: PARADIVE_COOKIE
        sync: false
      - key: DEEPSTATION_ID
        sync: false
      - key: DEEPSTATION_PASSWORD
        sync: false
      - key: DEEPSTATION_CACHE_SECONDS
        value: 120
      - key: DEEPSTATION_SESSION_SECONDS
        value: 1200
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /ms-playwright

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d2859" />
  <meta name="description" content="아이폰에 DiveSpot 설치하기" />
  <title>DiveSpot 아이폰 설치</title>
  <link rel="manifest" href="/manifest.webmanifest?v=9" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DiveSpot" />
  <style>
    :root{--navy:#0d2859;--purple:#5837b8;--bg:#f4f7fd;--muted:#71809f;--line:#e2e8f2}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 90% 0%,rgba(88,55,184,.12),transparent 25rem),var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Segoe UI",sans-serif;color:var(--navy)}
    main{width:min(520px,calc(100% - 32px));margin:0 auto;padding:max(30px,env(safe-area-inset-top)) 0 max(34px,env(safe-area-inset-bottom))}
    .brand{display:flex;align-items:center;gap:14px;margin:8px 0 26px}.brand img{width:58px;height:58px;border-radius:17px;box-shadow:0 12px 28px rgba(13,40,89,.18)}.brand h1{margin:0;font-size:27px}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:700}
    .card{background:#fff;border:1px solid rgba(255,255,255,.9);border-radius:25px;padding:25px;box-shadow:0 18px 45px rgba(29,55,100,.11)}
    .tag{display:inline-flex;padding:7px 10px;border-radius:999px;background:#f0ebff;color:var(--purple);font-size:11px;font-weight:900}.card h2{margin:14px 0 9px;font-size:25px;line-height:1.3}.lead{margin:0 0 20px;color:var(--muted);font-size:14px;line-height:1.65}
    .share{display:inline-grid;place-items:center;width:29px;height:29px;border:2px solid currentColor;border-radius:9px;font-size:18px;font-weight:500;line-height:1;position:relative}.share:before{content:"↑";position:absolute;top:-11px;background:#fff;padding:0 3px}.steps{margin:22px 0 0;padding:0;list-style:none;display:grid;gap:14px}.steps li{display:grid;grid-template-columns:39px 1fr;gap:12px;align-items:center;color:#364b73;font-size:14px;line-height:1.55}.num{width:39px;height:39px;border-radius:12px;background:#f2edff;color:var(--purple);display:grid;place-items:center;font-weight:900}
    a.button{width:100%;min-height:54px;margin-top:23px;border-radius:16px;display:flex;align-items:center;justify-content:center;text-decoration:none;background:linear-gradient(135deg,#38207f,#6f4bd0);color:#fff;font-weight:900;font-size:15px;box-shadow:0 12px 24px rgba(88,55,184,.22)}
    .note{margin:17px 0 0;padding:14px 15px;border-radius:14px;background:#f7f9fd;color:var(--muted);font-size:12px;line-height:1.55;border:1px solid var(--line)}
    .safari-warning{display:none;margin-bottom:17px;padding:13px 14px;border-radius:14px;background:#fff2df;color:#a65b00;font-size:13px;font-weight:800;line-height:1.5}.safari-warning.show{display:block}
  </style>
</head>
<body>
<main>
  <div class="brand"><img src="/icons/apple-touch-icon.png" alt="DiveSpot" /><div><h1>DiveSpot</h1><p>아이폰 홈 화면 설치</p></div></div>
  <section class="card">
    <div id="safariWarning" class="safari-warning">아이폰에서는 이 링크를 Safari로 열어야 홈 화면에 추가할 수 있어요.</div>
    <span class="tag">iPHONE</span>
    <h2>Safari에서 홈 화면에 추가하세요</h2>
    <p class="lead">아이폰은 웹페이지에서 설치 창을 자동으로 띄울 수 없어 아래 순서로 한 번만 추가하면 돼요.</p>
    <ol class="steps">
      <li><span class="num"><span class="share" aria-hidden="true"></span></span><span>Safari 아래쪽의 <b>공유 버튼</b>을 누릅니다.</span></li>
      <li><span class="num">2</span><span>목록에서 <b>홈 화면에 추가</b>를 누릅니다.</span></li>
      <li><span class="num">3</span><span><b>웹 앱으로 열기</b>를 켜고 오른쪽 위 <b>추가</b>를 누릅니다.</span></li>
    </ol>
    <a class="button" href="/">DiveSpot 화면 열기</a>
    <p class="note">홈 화면에서 DiveSpot 아이콘을 누르면 주소창 없이 앱처럼 열립니다.</p>
  </section>
</main>
<script>
(() => {
  "use strict";
  const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  if (standalone) {
    location.replace("/");
    return;
  }
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isSafari = /Safari/i.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS/i.test(ua);
  if (isIOS && !isSafari) document.querySelector("#safariWarning").classList.add("show");
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js?v=10").catch(() => {});
})();
</script>
</body>
</html>

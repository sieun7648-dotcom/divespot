<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f7fd" />
  <meta name="description" content="파라다이브와 딥스테이션 예약 현황" />
  <title>DiveSpot</title>
  <link rel="manifest" href="/manifest.webmanifest?v=6" />
  <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

:root {
  --bg: #f4f7fd;
  --card: #ffffff;
  --text: #10234d;
  --muted: #71809f;
  --line: #e2e8f2;
  --blue: #1559d8;
  --blue-dark: #053a92;
  --purple: #5837b8;
  --purple-dark: #38207f;
  --green: #22a96f;
  --green-bg: #e7f7ef;
  --orange: #ff9700;
  --orange-bg: #fff2df;
  --red: #ff4d59;
  --red-bg: #ffe9eb;
  --shadow: 0 14px 35px rgba(29, 55, 100, .10);
}

* { box-sizing: border-box; }

html { min-height: 100%; background: var(--bg); }

body {
  margin: 0;
  min-width: 320px;
  color: var(--text);
  background:
    radial-gradient(circle at 5% 0%, rgba(63, 122, 255, .10), transparent 30rem),
    var(--bg);
  font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input { font: inherit; }
button { cursor: pointer; }

.app {
  width: min(980px, calc(100% - 36px));
  margin: 0 auto;
  padding: max(26px, env(safe-area-inset-top)) 0 max(24px, env(safe-area-inset-bottom));
}

.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 26px;
}

.topbar h1 {
  margin: 0;
  font-size: clamp(34px, 5vw, 48px);
  line-height: 1;
  letter-spacing: -.045em;
  color: #0d2859;
}

.topbar p {
  margin: 10px 0 0;
  font-size: 15px;
  font-weight: 700;
  color: var(--muted);
}

.top-actions { display: flex; gap: 12px; }

.circle-button,
.help-button {
  border: 0;
  background: #fff;
  box-shadow: var(--shadow);
  color: #102b5d;
}

.circle-button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  font-size: 24px;
}

.help-button {
  height: 48px;
  padding: 0 18px;
  border-radius: 24px;
  font-weight: 800;
}

.help-button span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  margin-right: 7px;
  border: 2px solid currentColor;
  border-radius: 50%;
  font-size: 12px;
}

.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 22px;
}

.date-box {
  display: flex;
  align-items: center;
  width: 300px;
  min-height: 66px;
  padding: 0 20px;
  background: #fff;
  border-radius: 16px;
  box-shadow: var(--shadow);
}

.calendar-icon {
  display: inline-flex;
  flex: 0 0 auto;
  width: 21px;
  height: 21px;
  margin-right: 12px;
  color: var(--text);
}

.calendar-icon svg {
  display: block;
  width: 100%;
  height: 100%;
  stroke: currentColor;
}

.date-box input {
  width: 100%;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font-size: 20px;
  font-weight: 800;
}

.refresh-button {
  min-height: 66px;
  padding: 0 24px;
  border: 0;
  border-radius: 16px;
  color: #0c55d1;
  background: #fff;
  box-shadow: var(--shadow);
  font-size: 17px;
  font-weight: 900;
}

.refresh-symbol {
  display: inline-block;
  margin-right: 8px;
  font-size: 23px;
}

.refresh-button.loading .refresh-symbol { animation: spin .8s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }

.login-panel {
  display: grid;
  grid-template-columns: auto 1px 1fr 1px 1fr auto;
  align-items: center;
  gap: 22px;
  margin-bottom: 24px;
  padding: 20px 26px;
  background: #fff;
  border-radius: 18px;
  box-shadow: var(--shadow);
}

.login-panel > strong {
  font-size: 17px;
}

.login-divider {
  width: 1px;
  height: 42px;
  background: var(--line);
}

.login-item {
  display: flex;
  align-items: center;
  gap: 12px;
}

.login-item small {
  display: block;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}

.login-item b {
  display: block;
  margin-top: 2px;
  font-size: 15px;
}

.login-check {
  display: inline-flex;
  width: 38px;
  height: 38px;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: #fff;
  font-size: 22px;
  font-weight: 900;
}

.login-check.para { background: linear-gradient(135deg, #47c99b, #20a36e); }
.login-check.deep { background: linear-gradient(135deg, #7051d7, #4c2cb8); }

.update-time {
  color: var(--muted);
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
}

.notice {
  margin-bottom: 18px;
  padding: 13px 16px;
  border: 1px solid #f0ce71;
  border-radius: 13px;
  color: #8a5f08;
  background: #fff7dc;
  font-size: 13px;
  font-weight: 700;
}

.facility-list {
  display: grid;
  gap: 24px;
}

.facility-card {
  overflow: hidden;
  background: #fff;
  border-radius: 22px;
  box-shadow: var(--shadow);
}

.facility-hero {
  display: grid;
  grid-template-columns: 1.2fr repeat(3, .7fr);
  align-items: center;
  min-height: 154px;
  padding: 24px 28px;
  color: #fff;
}

.facility-card.paradive .facility-hero {
  background: linear-gradient(135deg, #1d65df 0%, #0d3d96 100%);
}

.facility-card.deepstation .facility-hero {
  background: linear-gradient(135deg, #6043be 0%, #382174 100%);
}

.facility-title h2 {
  margin: 0 0 14px;
  font-size: 30px;
  letter-spacing: -.025em;
}

.facility-badge {
  display: inline-flex;
  align-items: center;
  min-height: 31px;
  padding: 5px 13px;
  border-radius: 999px;
  color: #14704c;
  background: #c9f5d9;
  font-size: 13px;
  font-weight: 900;
}

.facility-badge.limited {
  color: #8a5600;
  background: #ffe1a8;
}

.facility-badge.closed {
  color: #a72832;
  background: #ffd2d6;
}

.hero-stat {
  min-width: 0;
  padding: 0 18px;
  border-left: 1px solid rgba(255,255,255,.28);
}

.hero-stat span {
  display: block;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 800;
  opacity: .9;
}

.hero-stat strong {
  font-size: 35px;
  line-height: 1;
  letter-spacing: -.04em;
}

.hero-stat small {
  margin-left: 3px;
  font-size: 13px;
  font-weight: 800;
}

.table-wrap { padding: 0 22px; }

.session-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.session-table th,
.session-table td {
  height: 64px;
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--line);
}

.session-table th {
  color: var(--text);
  font-size: 13px;
  font-weight: 900;
}

.session-table td {
  font-size: 14px;
  font-weight: 800;
}

.session-table .part {
  color: #1457ca;
  font-size: 17px;
  font-weight: 900;
}

.session-table .time {
  color: var(--muted);
  font-size: 13px;
  white-space: nowrap;
}

.value {
  font-size: 16px;
  font-weight: 900;
}

.value.available { color: var(--green); }
.value.limited { color: var(--orange); }
.value.closed { color: var(--red); }
.value.unknown { color: var(--muted); }

.facility-footer { padding: 18px 22px 20px; }

.booking-button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 58px;
  border-radius: 12px;
  color: #fff;
  text-decoration: none;
  font-size: 16px;
  font-weight: 900;
}

.paradive .booking-button {
  background: linear-gradient(90deg, #0b4fc2, #062b73);
}

.deepstation .booking-button {
  background: linear-gradient(90deg, #5131b3, #342077);
}

.booking-button::before {
  content: "↗";
  margin-right: 10px;
  font-size: 20px;
}

.booking-button::after {
  content: "›";
  margin-left: 12px;
  font-size: 24px;
}

.footer {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  margin-top: 22px;
  padding: 22px 24px;
  color: var(--muted);
  background: rgba(255,255,255,.65);
  border-radius: 16px;
  font-size: 12px;
  font-weight: 700;
}

.footer-brand strong { color: #104fbc; }

.help-dialog {
  width: min(430px, calc(100% - 32px));
  border: 0;
  padding: 0;
  background: transparent;
}

.help-dialog::backdrop {
  background: rgba(10, 24, 55, .45);
  backdrop-filter: blur(4px);
}

.help-card {
  padding: 22px;
  border-radius: 20px;
  background: #fff;
  box-shadow: 0 25px 80px rgba(13, 34, 75, .24);
}

.help-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.help-head h2 { margin: 0; }

.help-head button {
  width: 34px;
  height: 34px;
  border: 0;
  border-radius: 50%;
  background: #edf1f7;
  font-size: 22px;
}

.help-card ol {
  margin: 20px 0 0;
  padding-left: 20px;
  color: #52617d;
  line-height: 1.9;
}

.skeleton {
  min-height: 400px;
  background: linear-gradient(90deg, #f6f8fc 25%, #ffffff 45%, #f6f8fc 65%);
  background-size: 200% 100%;
  animation: shimmer 1.2s infinite;
}

@keyframes shimmer { to { background-position: -200% 0; } }

@media (max-width: 760px) {
  .app {
    width: min(100% - 20px, 560px);
    padding-top: max(20px, env(safe-area-inset-top));
  }

  .topbar { align-items: center; margin-bottom: 20px; }

  .topbar h1 { font-size: 32px; }
  .topbar p { font-size: 12px; margin-top: 7px; }

  .circle-button { display: none; }

  .help-button {
    width: 42px;
    height: 42px;
    padding: 0;
    font-size: 0;
    border-radius: 50%;
  }

  .help-button span {
    margin: 0;
    font-size: 12px;
  }

  .control-row { gap: 10px; }

  .date-box {
    flex: 1;
    min-width: 0;
    width: auto;
    min-height: 56px;
    padding: 0 14px;
  }

  .date-box input { font-size: 16px; }

  .refresh-button {
    width: 56px;
    min-height: 56px;
    padding: 0;
    font-size: 0;
  }

  .refresh-symbol {
    margin: 0;
    font-size: 25px;
  }

  .login-panel {
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
    padding: 14px;
  }

  .login-panel > strong,
  .login-divider,
  .update-time {
    display: none;
  }

  .login-item { gap: 8px; }

  .login-check {
    width: 32px;
    height: 32px;
    font-size: 18px;
  }

  .login-item small { font-size: 10px; }
  .login-item b { font-size: 12px; }

  .facility-hero {
    grid-template-columns: 1.35fr repeat(3, .7fr);
    min-height: 118px;
    padding: 18px 14px;
  }

  .facility-title h2 {
    margin-bottom: 10px;
    font-size: 19px;
  }

  .facility-badge {
    min-height: 25px;
    padding: 4px 9px;
    font-size: 10px;
  }

  .hero-stat {
    padding: 0 7px;
    text-align: center;
  }

  .hero-stat span {
    margin-bottom: 5px;
    font-size: 9px;
    line-height: 1.3;
  }

  .hero-stat strong { font-size: 23px; }
  .hero-stat small { display: block; margin: 3px 0 0; font-size: 9px; }

  .table-wrap { padding: 0 10px; }

  .session-table th,
  .session-table td {
    height: 54px;
    padding: 8px 3px;
  }

  .session-table th {
    font-size: 10px;
  }

  .session-table td {
    font-size: 11px;
  }

  .session-table .time-column,
  .session-table .time {
    display: none;
  }

  .session-table .part { font-size: 14px; }
  .value { font-size: 12px; }

  .facility-footer { padding: 14px 10px 16px; }

  .booking-button {
    min-height: 52px;
    font-size: 13px;
  }

  .footer {
    display: block;
    padding: 16px;
    text-align: center;
    font-size: 10px;
  }

  .footer-brand { margin-top: 8px; }
}

@media (max-width: 380px) {
  .facility-hero {
    grid-template-columns: 1.15fr repeat(3, .72fr);
  }

  .hero-stat strong { font-size: 20px; }
  .session-table th { font-size: 9px; }
  .value { font-size: 11px; }
}

.login-check.disconnected {
  background: #9aa7bd !important;
}

  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>DiveSpot</h1>
        <p>실시간 다이빙 예약 현황</p>
      </div>
      <div class="top-actions">
        <button id="themeButton" class="circle-button" type="button" aria-label="화면 밝기">☼</button>
        <button id="helpButton" class="help-button" type="button"><span>?</span> 사용 방법</button>
      </div>
    </header>

    <section class="control-row">
      <label class="date-box">
        <span class="calendar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3.5" y="5.5" width="17" height="15" rx="2.5" stroke-width="2"/>
            <path d="M7.5 3.5V7.5M16.5 3.5V7.5M3.5 9.5H20.5" stroke-width="2" stroke-linecap="round"/>
            <path d="M8 13H10M14 13H16M8 17H10M14 17H16" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <input id="dateInput" type="date" />
      </label>
      <button id="refreshButton" class="refresh-button" type="button">
        <span class="refresh-symbol">↻</span> 전체 새로고침
      </button>
    </section>

    <section class="login-panel">
      <strong>연결 상태</strong>
      <div class="login-divider"></div>
      <div class="login-item">
        <span id="paradiveStatusIcon" class="login-check para">✓</span>
        <span><small>파라다이브</small><b id="paradiveStatusText">확인 중</b></span>
      </div>
      <div class="login-divider"></div>
      <div class="login-item">
        <span id="deepstationStatusIcon" class="login-check deep">✓</span>
        <span><small>딥스테이션</small><b id="deepstationStatusText">확인 중</b></span>
      </div>
      <div class="update-time" id="updateTime">--:-- 업데이트</div>
    </section>

    <section id="notice" class="notice" hidden></section>
    <section id="facilityList" class="facility-list" aria-live="polite"></section>

    <footer class="footer">
      <div class="footer-note">ⓘ 잔여 인원 및 부이 정보는 실제 예약페이지 기준으로 안내됩니다.</div>
      <div class="footer-brand">Made by <strong>SIEUN</strong></div>
    </footer>
  </main>

  <dialog id="helpDialog" class="help-dialog">
    <div class="help-card">
      <div class="help-head">
        <h2>사용 방법</h2>
        <button id="closeHelpButton" type="button">×</button>
      </div>
      <ol>
        <li>조회할 날짜를 선택합니다.</li>
        <li>시설별 잔여 인원과 부이 현황을 확인합니다.</li>
        <li>예약은 각 시설의 공식 예약페이지에서 진행합니다.</li>
      </ol>
    </div>
  </dialog>

  <script src="/app.js?v=8" defer></script>
</body>
</html>

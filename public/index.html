<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fc">
  <meta name="description" content="프리다이빙 예약 현황을 한눈에 확인하는 DiveSpot">
  <title>DiveSpot</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <div class="brand-line"><h1>DiveSpot</h1><span class="version">v2.0</span></div>
        <p>Real-time Dive Reservation</p>
      </div>
      <button id="helpButton" class="icon-button" type="button" aria-label="사용방법 보기">?</button>
    </header>

    <section class="toolbar">
      <label class="date-field">
        <span>조회 날짜</span>
        <input id="dateInput" type="date">
      </label>
      <button id="refreshButton" class="refresh-button" type="button">
        <span class="refresh-icon">↻</span><span class="refresh-text">새로고침</span>
      </button>
    </section>

    <section id="notice" class="notice" hidden></section>
    <section id="facilityList" class="facility-list" aria-live="polite"></section>

    <footer class="footer">
      <p>잔여 현황은 실제 예약페이지와 차이가 있을 수 있습니다.</p>
      <strong>Made by SIEUN</strong>
    </footer>
  </main>

  <dialog id="helpDialog" class="help-dialog">
    <div class="help-card">
      <div class="help-title-row">
        <h2>사용방법</h2>
        <button id="closeHelpButton" class="dialog-close" type="button" aria-label="닫기">×</button>
      </div>
      <ol>
        <li>조회할 날짜를 선택합니다.</li>
        <li>시설별 잔여 인원과 부이 현황을 확인합니다.</li>
        <li>예약하려면 공식 예약페이지 버튼을 누릅니다.</li>
      </ol>
      <div class="legend">
        <span class="legend-item available">여유</span>
        <span class="legend-item limited">마감 임박</span>
        <span class="legend-item closed">마감</span>
      </div>
    </div>
  </dialog>

  <script src="/app.js" defer></script>
</body>
</html>
